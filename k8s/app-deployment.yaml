apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordcraft-app
  labels:
    app: wordcraft-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wordcraft-app
  template:
    metadata:
      labels:
        app: wordcraft-app
    spec:
      containers:
        - name: wordcraft-app
          image: pradyotc/wordcraft-app:0ebda12f
          ports:
            - containerPort: 3000
          env:
            - name: DB_HOST
              value: "db"
            - name: DB_USER
              value: "root"
            - name: DB_PASSWORD
              value: "password"
            - name: DB_NAME
              value: "wordcraft"
