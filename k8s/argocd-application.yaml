apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wordcraft
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/PradyotC/wordgraft.git'
    targetRevision: HEAD
    path: k8s
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: wordcraft
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
